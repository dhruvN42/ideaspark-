<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaSpark – Random Idea Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">
    <div class="badge">⚡ IdeaSpark v1.0</div>
    <h1>Random <span>Idea</span><br/>Generator</h1>
    <p class="subtitle">// pick a category → spark a new idea</p>

    <!-- Stats Counter -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="totalGenerated">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalSaved">0</div>
        <div class="stat-label">Saved</div>
      </div>
    </div>

    <!-- Category Buttons -->
    <div class="categories" id="categoryBtns">
      <button class="cat-btn active" data-cat="startup">🚀 Startup</button>
      <button class="cat-btn" data-cat="app">📱 App</button>
      <button class="cat-btn" data-cat="movie">🎬 Movie</button>
      <button class="cat-btn" data-cat="game">🎮 Game</button>
      <button class="cat-btn" data-cat="random">🎲 Surprise</button>
    </div>

    <!-- Idea Display Card -->
    <div class="idea-card" id="ideaCard" onclick="copyIdea()" title="Click to copy">
      <div class="idea-tag" id="ideaTag">— press generate —</div>
      <div class="idea-text" id="ideaText">Your next big idea is one click away</div>
      <div class="word-pills" id="wordPills"></div>
      <div class="idea-number" id="ideaNumber">#000</div>
    </div>
    <p class="click-hint">📋 click card to copy idea</p>

    <!-- Generate Button -->
    <button class="generate-btn" id="generateBtn" onclick="generateIdea()">
      ⚡ Generate Idea
    </button>

    <!-- History Section -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-title">
        <span>Recent Ideas</span>
        <button class="clear-btn" onclick="clearHistory()">✕ Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- Copy Toast Notification -->
  <div class="copy-toast" id="copyToast">COPIED! ✓</div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
